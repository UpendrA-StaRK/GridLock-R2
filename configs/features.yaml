# configs/features.yaml
# GridLock R2 — PS1: Parking-Induced Congestion
# Feature list for XGBoost/LightGBM model
# ─────────────────────────────────────────────────────────────────
# RULE: Never hardcode these names in Python.
#       Always read from this file via: yaml.safe_load(open("configs/features.yaml"))
# RULE: Changing a feature only requires editing this file + retraining.
# RULE: Log the features.yaml hash in every training run.
# ─────────────────────────────────────────────────────────────────

# ── Temporal Features ─────────────────────────────────────────────
# Extracted from created_datetime (UTC → IST for display, UTC for computation)
#
# Phase 3 change (v2.1): hour_of_day and day_of_week replaced with cyclical
# sin/cos encoding. Raw integers create an artificial "boundary" where hour 23
# and hour 0 appear numerically far apart, but they are temporally adjacent.
# Cyclical encoding maps each value onto a circle:
#   hour_sin = sin(2π × hour / 24)    hour_cos = cos(2π × hour / 24)
#   dow_sin  = sin(2π × dow / 7)     dow_cos  = cos(2π × dow / 7)
# XGBoost converges faster and generalises better at hour/day boundaries.
# Reference: arXiv energy/traffic forecasting studies, towardsdatascience.com
temporal:
  - hour_sin             # float — sin(2π × hour_of_day / 24)
  - hour_cos             # float — cos(2π × hour_of_day / 24)
  - dow_sin              # float — sin(2π × day_of_week / 7)
  - dow_cos              # float — cos(2π × day_of_week / 7)
  - is_weekend           # int [0, 1]   — Saturday + Sunday = 1
  - month                # int [1, 12]  — captures seasonal enforcement patterns

# ── Historical / Rolling Features ───────────────────────────────────
# Computed during Phase B (aggregate_to_zone_grid) using shift(1).rolling(7).mean()
# Leakage-free: current day's count is shifted out before rolling.
historical:
  - rolling_7d_count     # float — 7-day trailing mean of violation count per (zone_id, hour_of_day)
                         # Grouped by (zone_id, hour_of_day) for hour resolution,
                         # or by zone_id for day resolution.
                         # shift(1) ensures today's count never leaks in.
                         # Expected to be top SHAP feature after training.

# ── Zone Aggregate Features (Phase 1 replacement for zone_id) ────────
# IMPORTANT: These replace zone_id (DBSCAN cluster label), police_station_id,
# and center_code_encoded. Those three were ordinal numeric encodings of a
# categorical identifier — XGBoost was treating zone 50 as "between zone 49 and
# zone 51", which is meaningless for DBSCAN labels.
#
# These aggregates are computed ONLY on the TRAINING split and joined to both
# train and test by zone_id. This avoids test leakage while giving the model
# rich, interpretable zone-level signals.
#
# Computed in: src/data/features.py  aggregate_to_zone_grid()  (Phase B)
# Also added separately as zone-static features in _add_zone_aggregate_features()
zone_aggregates:
  - zone_mean_count      # float — mean zone_hour_violation_count over training period
                         # Captures zone-level baseline activity (replaces zone_id lookup)
  - zone_median_count    # float — median zone_hour_violation_count over training period
                         # Robust to outlier enforcement surges
  - zone_cis_score       # float — CIS score (junction_weight × violation_density) per zone
                         # Encodes the congestion-risk profile of each zone
  - zone_junction_frac   # float — fraction of all violations at junctions in this zone
                         # Zone-level static spatial feature (complement to fraction_at_junction)
  - zone_total_count     # int   — total violations in zone over training period
                         # Absolute scale signal (some zones are larger / more active)

# ── Spatial Features ──────────────────────────────────────────────
# fraction_at_junction is time-block-level (varies per zone×hour).
# zone_junction_frac (above) is zone-level static.
spatial:
  - fraction_at_junction # float [0, 1] — fraction of violations at a junction in this time block
                         # This is the time-varying version; zone_junction_frac is the static version.

# ── Categorical Features (label-encoded) ─────────────────────────
# All encoded with sklearn LabelEncoder. Mappings saved alongside model checkpoint.
categorical:
  - violation_type_primary_encoded  # Primary atomic type after ast.literal_eval + explode
  - vehicle_type_encoded            # 22 unique vehicle types
  - dominant_violation_type         # Mode violation type in this zone×time block
  - dominant_vehicle_type           # Mode vehicle type in this zone×time block

# ── Optional / Under Evaluation ───────────────────────────────────
# Include in first training run. Check SHAP feature importance.
# Drop and retrain if importance rank < bottom 20% of all features.
optional:
  - data_sent_to_scita_mean  # float [0,1] — mean of whether challan forwarded to SCITA system.
                         # TRADEOFF: 0% null, cheap signal. BUT may reflect admin
                         # batching behaviour rather than violation pattern.
                         # Decision: include → check SHAP importance → drop if near-zero.

# ── Target Variable ───────────────────────────────────────────────
# Engineered column — does NOT exist in raw data.
# Created in src/data/features.py during zone × time-block aggregation.
target:
  col: zone_hour_violation_count      # int — violation count per zone per hour
  aggregation: count                  # COUNT of rows per (zone_id, hour_bucket)
  time_resolution: minute             # Aggregate by minute first to dedup; then roll to hour
  dedup_rule: >
    Deduplicate ONLY when ALL of these are identical:
    (latitude, longitude, violation_type, vehicle_type, created_datetime rounded to minute).
    Same-second events at different lat/lon = real multi-violation events — KEEP.

# ── Excluded Columns (documented here for traceability) ───────────
excluded:
  - description            # 100% null
  - closed_datetime        # 100% null
  - action_taken_timestamp # 100% null
  - data_sent_to_scita_timestamp  # 86% null + test-window only = pure temporal leakage
  - modified_datetime      # Post-event: filled AFTER violation recorded — not at prediction time
  - validation_status      # Post-event admin field + 42% null
  - validation_timestamp   # Post-event + 42% null + 8 missing days near split boundary
  - updated_vehicle_number # 42% null
  - updated_vehicle_type   # 42% null
  - id                     # Identifier — unique per row, no generalizable signal
  - vehicle_number         # 143k+ unique plates — would cause memorization not learning
  - location               # Free-text address — 1% null, geographic info covered by lat/lon
  - zone_id                # Ordinal encoding of categorical ID — meaningless numerically
  - police_station_id      # Collinear with zone_id (each zone ≈ one station)
  - center_code_encoded    # Collinear with police_station_id — no independent signal

# ── Encoding Registry ─────────────────────────────────────────────
# LabelEncoder mappings must be saved alongside model checkpoint.
# Path: checkpoints/<run_id>/label_encoders.pkl
# Never apply a new encoder at inference — always load saved encoders.
encodings:
  violation_type_primary_encoded:
    source_col: violation_type
    parse: ast.literal_eval   # Parse JSON list, take index[0] as primary type
    encoder: LabelEncoder
  vehicle_type_encoded:
    source_col: vehicle_type
    encoder: LabelEncoder
  # police_station_id and center_code_encoded are REMOVED (Phase 1 — collinear with zone)

# ── Version / Metadata ────────────────────────────────────────────
version: "2.1"
last_updated: "2026-06-18"
updated_by: "GridLock Phase 3 Improvement"
basis: "Full research audit 2026-06-18 — cyclical encoding for temporal features"
note: >
  Features v2.1 (Phase 3): hour_of_day → hour_sin + hour_cos;
  day_of_week → dow_sin + dow_cos. Cyclical encoding preserves temporal
  adjacency (hour 23 ≈ hour 0 in feature space). All other features unchanged.
  Retrain required. Fallback to v2.0 checkpoint if new model doesn't improve.
  Do not change feature names without: (1) updating this file, (2) appending to
  session_log.md, (3) retraining from scratch.
