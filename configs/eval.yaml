# configs/eval.yaml
# GridLock R2 — PS1: Parking-Induced Congestion
# Evaluation metrics, Congestion Impact Score (CIS), and Ranker formula
# ─────────────────────────────────────────────────────────────────
# RULE: CIS and ranker formulas are VERSIONED — not frozen.
#       Update formula_version and log the change in artifacts/session_log.md
#       whenever a better formula is found post-training.
# RULE: Never change formula_version mid-training — only between runs.
# ─────────────────────────────────────────────────────────────────

# ── Split Boundaries ──────────────────────────────────────────────
split:
  train_start: "2023-11-09"   # Actual first date in dataset (not Nov 01)
  train_end:   "2024-02-22"
  test_start:  "2024-02-23"
  test_end:    "2024-04-08"   # Actual last date in dataset (NOT Apr 30)
  timezone: "UTC"
  leakage_guard: >
    Assert max(train.created_datetime) < min(test.created_datetime).
    Raise hard error if this fails. Never skip this check.

# ── Internal Proxy Metrics ────────────────────────────────────────
# These are tracked internally to validate model quality.
# Judges evaluate qualitatively — no numeric leaderboard.
metrics:
  regression:
    primary: MAE                # Mean Absolute Error on zone_hour_violation_count
    secondary: RMSE             # Root Mean Square Error
    report_per_zone: true       # Always break down by zone_id, not just aggregate
    report_per_hour: true       # Break down by hour_of_day bucket

  ranking:
    primary: NDCG@10            # Normalised Discounted Cumulative Gain at top 10 zones
    secondary: Precision@K      # K = 5 and K = 10
    k_values: [5, 10]

  classification:               # Optional subtask — violation type prediction
    primary: F1_macro           # Macro F1 across all atomic violation types
    report_per_class: true      # Never report only aggregate — per-class breakdown required
    confusion_matrix: true

  clustering:
    silhouette_score: true      # DBSCAN zone quality
    visual_coherence: manual    # Human review of cluster map (done in notebook)

# ── Baseline Model ────────────────────────────────────────────────
# Must always be run and compared against. Model adds no value if it doesn't beat baseline.
baseline:
  name: frequency_ranker
  description: >
    Rank zones by raw historical violation count from the training period.
    No ML — pure frequency heuristic.
  must_beat_on: [Precision@K, NDCG@10]
  note: >
    If ML model does not beat baseline on BOTH Precision@K and NDCG@10,
    do not present it as the primary model. Investigate features and retrain.

# ── NDCG Relevance Definition ─────────────────────────────────────
ndcg_relevance:
  definition: >
    A zone is "relevant" (relevance grade = 1) if its actual violation count
    in the test period (Mar 1 – Apr 8 2024) falls in the top quartile (Q4, ≥ 75th percentile)
    across all zones.
  graded_relevance:
    top_quartile: 2       # relevance = 2 (highly relevant)
    second_quartile: 1    # relevance = 1 (relevant)
    bottom_half: 0        # relevance = 0 (not relevant)
  note: >
    Graded relevance (0/1/2) gives more information than binary and is standard for NDCG.
    "Relevant" in binary mode = top quartile only.

# ── Noise Zone Handling (DBSCAN label = -1) ───────────────────────
noise_zones:
  dbscan_label: -1
  treatment: keep_as_sparse_zone
  rationale: >
    DBSCAN noise points (label -1) represent genuine sparse/peripheral violations
    that don't cluster with any dense zone. Dropping them would silently remove
    real enforcement events. Instead, treat all noise points as a single "sparse zone".
  cis_weight_override: 0.5   # Noise zone gets 50% of normal junction_weight
                              # Rationale: sparse zones have lower congestion impact
                              # than dense zones regardless of junction presence.
  ranking_note: >
    Noise zone (zone_id=-1) will typically rank low due to low density.
    It should appear in output but with a LOW priority tier.
    Never suppress it completely — it documents where enforcement is sparse.

# ── Congestion Impact Score (CIS) ─────────────────────────────────
# CIS quantifies how much a zone's illegal parking contributes to actual congestion.
# Used to weight the enforcement ranker — high CIS zones get priority even if
# raw violation count is similar to low-CIS zones.
#
# Formula v1 (post-EDA, 2026-06-16):
#   CIS(zone) = violation_density_norm(zone) × junction_weight(zone)
#
# Where:
#   violation_density_norm = zone_violation_count / max_zone_violation_count
#                            (normalised to [0, 1] across all zones)
#   junction_weight = 1.5 if zone has any violations tagged is_at_junction=1
#                     1.0 otherwise
#
# Rationale:
#   - We have no external road-type data (FAQ prohibits external datasets).
#   - Junction presence is the best available proxy for road type/congestion severity.
#   - Junctions get 1.5× weight because blocking a junction causes cascading congestion.
#   - Normalised density ensures fair comparison across zones of different sizes.
#
# Note on road_type_weight:
#   If future data includes road classification (main/side/footpath),
#   replace junction_weight with:
#     main_road=2.0, side_road=1.0, footpath=1.5
#   For now, junction presence is the best defensible proxy available.

cis:
  formula_version: "2.0"
  formula_name: "density_x_junction_weight_x_severity"
  last_updated: "2026-06-22"
  formula: "CIS(zone) = violation_density_norm(zone) × junction_weight(zone) × avg_subtype_severity(zone)"
  components:
    violation_density_norm:
      description: "zone_violation_count / max_zone_violation_count across all zones"
      range: "[0.0, 1.0]"
      source_col: zone_hour_violation_count
    junction_weight:
      description: "1.5 if any violation in zone has is_at_junction=1, else 1.0"
      values: {at_junction: 1.5, not_at_junction: 1.0}
      source_col: is_at_junction
    avg_subtype_severity:
      description: "Mean severity of violation types in the zone"
      values: {
        "PARKING IN A MAIN ROAD": 3.0,
        "DOUBLE PARKING": 2.8,
        "PARKING NEAR ROAD CROSSING": 2.5,
        "PARKING NEAR TRAFFIC LIGHT OR ZEBRA CROSS": 2.5,
        "PARKING NEAR BUSTOP/SCHOOL/HOSPITAL ETC": 2.0,
        "PARKING OPPOSITE TO ANOTHER PARKED VEHICLE": 2.0,
        "PARKING ON FOOTPATH": 1.5,
        "default": 1.0
      }
      source_col: violation_type_primary
  output_range: "[0.0, 4.5]"
  update_policy: >
    CIS formula may be updated after any training run if a better formula
    demonstrably improves Precision@K or NDCG@10 on the test set.
    When updating: bump formula_version, add a note below, log in session_log.md.

  # Version history:
  # v1.0 (2026-06-16): violation_density_norm × junction_weight. Baseline formula.
  # v2.0 (2026-06-22): Added avg_subtype_severity based on violation_type_primary.
# ── Enforcement Priority Ranker ───────────────────────────────────
ranker:
  formula_version: "1.0"
  formula_name: "predicted_count_x_cis"
  last_updated: "2026-06-16"
  formula: "priority_score(zone, t) = predicted_count(zone, t) × CIS(zone)"
  description: >
    For a requested day and hour (t), score each zone by multiplying the model's
    predicted violation count for that time window by the zone's CIS score.
    Rank all zones descending by priority_score. Output top-K.
  output:
    top_k: 10
    priority_tiers:
      HIGH:   "priority_score >= 0.7 × max(priority_score)"
      MEDIUM: "priority_score >= 0.4 × max(priority_score)"
      LOW:    "priority_score < 0.4 × max(priority_score)"
  update_policy: >
    Ranker formula may be updated after training if ablation shows a better
    weighting (e.g. adding a time-decay factor or zone-area normalisation).
    When updating: bump formula_version, log in session_log.md.

  # Version history:
  # v1.0 (2026-06-16): predicted_count × CIS. Baseline ranker.

# ── Evaluation Output ─────────────────────────────────────────────
output:
  path: "data/outputs/eval_{timestamp}.json"
  save_per_zone_breakdown: true
  save_confusion_matrix: true
  save_ndcg_per_k: true
  save_baseline_comparison: true
  include_formula_versions: true    # Always record which CIS/ranker formula version was used

# ── Version / Metadata ────────────────────────────────────────────
version: "1.0"
last_updated: "2026-06-16"
updated_by: "Claude Sonnet 4.6 Thinking"
basis: "EDA audit 2026-06-16 — user-approved decisions"
